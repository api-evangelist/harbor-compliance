naftiko: 1.0.0-alpha2
info:
  label: Harbor Compliance API — Jurisdictions
  description: 'Harbor Compliance API — Jurisdictions. 2 operations. Lead operation: Harbor Compliance List jurisdictions.
    Self-contained Naftiko capability covering one Harbor Compliance business surface.'
  tags:
  - Harbor Compliance
  - Jurisdictions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HARBOR_COMPLIANCE_API_KEY: HARBOR_COMPLIANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: harbor-compliance-jurisdictions
    baseUri: https://api.harborcompliance.com/v1
    description: Harbor Compliance API — Jurisdictions business capability. Self-contained, no shared references.
    resources:
    - name: jurisdictions
      path: /jurisdictions
      operations:
      - name: listjurisdictions
        method: GET
        description: Harbor Compliance List jurisdictions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entity_type
          in: query
          type: string
          description: Filter jurisdictions by supported entity type.
    - name: jurisdictions-state
      path: /jurisdictions/{state}
      operations:
      - name: getjurisdiction
        method: GET
        description: Harbor Compliance Get jurisdiction details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: path
          type: string
          description: Two-letter state code (e.g., CA, NY, DE).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.HARBOR_COMPLIANCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: harbor-compliance-jurisdictions-rest
    port: 8080
    description: REST adapter for Harbor Compliance API — Jurisdictions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/jurisdictions
      name: jurisdictions
      description: REST surface for jurisdictions.
      operations:
      - method: GET
        name: listjurisdictions
        description: Harbor Compliance List jurisdictions
        call: harbor-compliance-jurisdictions.listjurisdictions
        with:
          entity_type: rest.entity_type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jurisdictions/{state}
      name: jurisdictions-state
      description: REST surface for jurisdictions-state.
      operations:
      - method: GET
        name: getjurisdiction
        description: Harbor Compliance Get jurisdiction details
        call: harbor-compliance-jurisdictions.getjurisdiction
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: harbor-compliance-jurisdictions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Harbor Compliance API — Jurisdictions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: harbor-compliance-list-jurisdictions
      description: Harbor Compliance List jurisdictions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harbor-compliance-jurisdictions.listjurisdictions
      with:
        entity_type: tools.entity_type
      outputParameters:
      - type: object
        mapping: $.
    - name: harbor-compliance-get-jurisdiction-details
      description: Harbor Compliance Get jurisdiction details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harbor-compliance-jurisdictions.getjurisdiction
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
