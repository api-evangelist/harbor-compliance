      - name: getentitycompliance
        method: GET
        description: Harbor Compliance Get compliance status for an entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.HARBOR_COMPLIANCE_API_KEY}}'
      placement: header
  exposes:
