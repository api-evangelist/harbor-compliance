    resources:
    - name: entities
      path: /entities
      operations:
      - name: listentities
        method: GET
        description: Harbor Compliance List business entities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: Filter entities by state of formation (two-letter state code).
        - name: entity_type
          in: query
          type: string
          description: Filter by entity type.
        - name: status
          in: query
          type: string
          description: Filter by entity status.
