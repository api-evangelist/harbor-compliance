        method: GET
        description: Harbor Compliance Get jurisdiction details
        inputParameters:
        - name: state
          in: path
          type: string
          required: true
          description: Two-letter state code (e.g., CA, NY, DE).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: Harbor Compliance List service orders
        inputParameters:
