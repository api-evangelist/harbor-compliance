naftiko: 1.0.0-alpha2
info:
  label: Harbor Compliance API
  description: The Harbor Compliance API enables partners to integrate compliance management capabilities into their platforms.
    The API provides programmatic access to business licensing, registered agent services, compliance tracking, and entity
    management workflows. Partners can automate compliance tasks, monitor filing deadlines, manage registered agent appointments,
    and track licensing requirements across jurisdictions.
  tags:
  - Harbor
  - Compliance
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: harbor-compliance
    baseUri: https://api.harborcompliance.com/v1
    description: Harbor Compliance API HTTP API.
    authentication:
      type: apikey
      in: header
      name: X-API-Key
      value: '{{HARBOR_COMPLIANCE_TOKEN}}'
    resources:
    - name: entities
      path: /entities
      operations:
      - name: listentities
        method: GET
        description: Harbor Compliance List business entities
        inputParameters:
        - name: state
          in: query
          type: string
          description: Filter entities by state of formation (two-letter state code).
        - name: entity_type
          in: query
          type: string
          description: Filter by entity type.
        - name: status
          in: query
          type: string
          description: Filter by entity status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createentity
        method: POST
        description: Harbor Compliance Create a business entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entities-entityid
      path: /entities/{entityId}
      operations:
      - name: getentity
        method: GET
        description: Harbor Compliance Get a business entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateentity
        method: PATCH
        description: Harbor Compliance Update a business entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entities-entityid-compliance
      path: /entities/{entityId}/compliance
