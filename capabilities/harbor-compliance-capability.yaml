        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlicense
        method: POST
        description: Harbor Compliance Create a license application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: licenses-licenseid
